services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: rebel_forge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./backend/data/pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    volumes:
      - ./backend/data:/app/data
      - ./backend/instructions:/app/instructions:ro
    command: >
      sh -c "alembic upgrade head &&
      uvicorn rebel_forge_backend.main:app --host 0.0.0.0 --port 8080"

  worker:
    build: ./backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    volumes:
      - ./backend/data:/app/data
      - ./backend/instructions:/app/instructions:ro
    command: >
      sh -c "alembic upgrade head &&
      python -m rebel_forge_backend.worker"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
